enabled: true

# Restrained relaxation controls
positional_k: 5000.0
dihedral_k: 500.0
hbond_k: 50.0
n_stages: 3
max_iterations: 200
freeze_backbone: true

# Temperature schedule
anneal:
  enabled: true
  t_start_K: 50
  t_end_K: 350
  n_steps: 50000
  cool_down: true

hydrogen_handling:
  master_mode: implicit
  parameterize_explicit_hydrogens: true
  final_structure_mode: all_atom
  optimize_added_hydrogens: true
  strict_exchangeable_site_validation: true
