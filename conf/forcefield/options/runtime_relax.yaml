enabled: true
relax_enabled: true
cache_enabled: true
cache_dir: .cache/poly_csp/runtime_params
soft_repulsion_k_kj_per_mol_nm2: 800.0
soft_repulsion_cutoff_nm: 0.6

# Restrained relaxation controls
positional_k: 5000.0
dihedral_k: 500.0
hbond_k: 50.0
n_stages: 3
max_iterations: 200
freeze_backbone: true

# Temperature schedule
anneal:
  enabled: true
  t_start_K: 50
  t_end_K: 350
  n_steps: 50000
  cool_down: true
