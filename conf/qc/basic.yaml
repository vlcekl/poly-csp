enabled: true

# Pair exclusions for clash scoring.
exclude_13: true
exclude_14: false

# Global heavy-atom minimum distance.
min_heavy_distance_A: 1.05

# Per-class minimum distances.
min_backbone_backbone_distance_A: 1.05
