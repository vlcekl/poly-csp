min_selector_selector_distance_A: 1.00

# Symmetry and ordering-related QC checks.
max_screw_symmetry_rmsd_A: 0.50
min_hbond_fraction: 0.00
max_selector_torsion_std_deg: null

# Optional hard-fail for CLI/CI usage.
fail_on_thresholds: false
