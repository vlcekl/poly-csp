name: amylose_ADMPC_ChiralpakAD_4over3_default

# Left-handed 4/3 helix: repeat is 4 residues over 3 turns
repeat_residues: 4
repeat_turns: 3

# Per-residue screw parameters
# theta = -2π*(3/4) = -3π/2 ≈ -4.71238898038469 rad
theta_rad: -4.71238898038469

# Rise per residue along helix axis (Å)
rise_A: 3.7

# Metadata used by reports / QC; keep consistent with repeat above
residues_per_turn: 1.3333333333333333  # 4/3
pitch_A: 4.933333333333334              # rise_A * residues_per_turn

handedness: left