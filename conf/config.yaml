defaults:
  - helix: admcp_chiralpak_ad
  - polymer: amylose
  - selector: dmpc_35
  - ordering: basic
  - relax: restrained
  - qc: basic
  - multi_opt: default
  - _self_

output:
  dir: outputs
  export_formats: [pdb, sdf, amber]

polymer:
  kind: amylose
  dp: 12
  monomer_representation: anhydro
  end_mode: open
  end_caps: {}

amber:
  enabled: true
  dir: amber
  charge_model: bcc
  parameter_backend: placeholder
  net_charge: auto

selector:
  enabled: true
  name: 35dmpc
  sites: [C2,C3,C6]
  pose:
    dihedral_targets_deg: {}
    carbonyl_dir_local: null
    aromatic_normal_local: null
