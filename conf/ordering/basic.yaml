enabled: true
max_candidates: 64
positional_k: 5000.0
freeze_backbone: true
max_site_sweeps: 5
soft_n_stages: 2
soft_max_iterations: 40
full_max_iterations: 80
final_restraint_factor: 0.15
hbond_k: 0.0
soft_repulsion_k_kj_per_mol_nm2: ${seed_bias.soft_repulsion_k_kj_per_mol_nm2}
soft_repulsion_cutoff_nm: ${seed_bias.soft_repulsion_cutoff_nm}
anti_stacking_sigma_scale: ${seed_bias.anti_stacking_sigma_scale}
soft_exclude_14: ${seed_bias.soft_exclude_14}
ideal_hbond_target_nm: ${seed_bias.ideal_hbond_target_nm}
hbond_neighbor_window: ${seed_bias.hbond_neighbor_window}
hbond_pairing_mode: ${seed_bias.hbond_pairing_mode}
hbond_restraint_atom_mode: ${seed_bias.hbond_restraint_atom_mode}
skip_full_stage: ${seed_bias.skip_full_stage}
soft_selector_hbond_bias:
  enabled: ${seed_bias.soft_selector_hbond_bias.enabled}
  epsilon_kj_per_mol: ${seed_bias.soft_selector_hbond_bias.epsilon_kj_per_mol}
  r0_nm: ${seed_bias.soft_selector_hbond_bias.r0_nm}
  half_width_nm: ${seed_bias.soft_selector_hbond_bias.half_width_nm}
  hbond_neighbor_window: ${seed_bias.soft_selector_hbond_bias.hbond_neighbor_window}
hbond_max_distance_A: 3.3
hbond_min_donor_angle_deg: 100.0
hbond_min_acceptor_angle_deg: 90.0
